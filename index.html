<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Clipper & GIF Maker</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111827">

  <style>
    body { background-color: #111827; color: white; padding: 1rem; font-family: sans-serif; }
    .container { background-color: #1f2937; padding: 1.5rem; border-radius: 0.75rem; max-width: 28rem; margin: 2rem auto; box-sizing: border-box; }
    input, select, button { width: 100%; margin-bottom: 1.5rem; padding: 0.75rem; border-radius: 0.5rem; color: black; box-sizing: border-box; border: 1px solid #4b5563; font-size: 1rem; }
    input[type="file"], input[type="number"] { color: white; background-color: #374151; }
    button { background-color: #2563eb; color: white; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; }
    button:hover { background-color: #1d4ed8; }
    
    .download-btn { background-color: #16a34a; display: block; text-align: center; text-decoration: none; padding: 0.75rem; margin-top: 0.5rem; color: white; font-weight: bold; border-radius: 0.5rem; }
    .download-gif { background-color: #9333ea; }
    
    #status { white-space: pre-wrap; word-break: break-all; }
    
    /* Tab Styling */
    .tab-container { display: flex; margin-bottom: 1.5rem; border-radius: 0.5rem; overflow: hidden; border: 1px solid #4b5563; }
    .tab-btn { flex: 1; padding: 0.75rem; text-align: center; background-color: #374151; color: white; font-weight: bold; cursor: pointer; border: none; margin-bottom: 0; border-radius: 0; }
    .tab-btn.active { background-color: #2563eb; }
  </style>
  
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
</head>
<body>
  <div class="container shadow-lg">
    
    <!-- Tab Navigation -->
    <div class="tab-container">
      <div id="btn-clips" class="tab-btn active">Make Clips</div>
      <div id="btn-gifs" class="tab-btn">Make GIFs</div>
    </div>
    
    <!-- CLIP MAKER TAB -->
    <div id="tab-clips">
      <h2 style="font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; text-align: center; color: #60a5fa;">Video Clipper</h2>
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">1. Upload Video:</label>
      <input type="file" id="clip-video" accept="video/*">
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">2. Number of Clips:</label>
      <input type="number" id="clip-count" value="3" min="1" max="20">
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">3. Custom Clip Length (Seconds):</label>
      <input type="number" id="clip-length" value="2" min="1" max="300">
      
      <button id="process-clip-btn">Process Clips</button>
    </div>

    <!-- GIF MAKER TAB -->
    <div id="tab-gifs" style="display: none;">
      <h2 style="font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; text-align: center; color: #c084fc;">GIF & Watermark Maker</h2>
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">1. Upload Short Video:</label>
      <input type="file" id="gif-video" accept="video/*">
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">2. Watermark Image (Optional):</label>
      <input type="file" id="gif-watermark" accept="image/png, image/jpeg">
      <p style="font-size: 0.75rem; color: #9ca3af; margin-top: -1rem; margin-bottom: 1rem;">Watermark will be placed in the bottom right corner.</p>
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">3. Speed:</label>
      <select id="gif-speed">
        <option value="0.5">Slow (Half Speed)</option>
        <option value="1" selected>Normal (1x)</option>
        <option value="2">Fast (Double Speed)</option>
      </select>
      
      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">4. GIF Resolution:</label>
      <select id="gif-res">
        <option value="320">Small (320px Width - Best for phones)</option>
        <option value="480">Medium (480px Width)</option>
        <option value="640">Large (640px Width - Might lag)</option>
      </select>

      <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">5. Loop Direction:</label>
      <select id="gif-loop">
        <option value="normal">Standard (Forward Only)</option>
        <option value="reverse">Reversed (Backward Only)</option>
        <option value="pingpong">Ping-Pong (Forward then Backward)</option>
      </select>
      
      <button id="process-gif-btn" style="background-color: #9333ea;">Create GIF</button>
    </div>
    
    <!-- SHARED OUTPUT -->
    <div id="status" style="margin-top: 1rem; text-align: center; color: #9ca3af; font-family: monospace; font-size: 0.85rem;"></div>
    <div id="output" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
      corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js',
      log: true 
    });

    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    // --- TAB SWITCHING LOGIC ---
    const btnClips = document.getElementById('btn-clips');
    const btnGifs = document.getElementById('btn-gifs');
    const tabClips = document.getElementById('tab-clips');
    const tabGifs = document.getElementById('tab-gifs');

    btnClips.addEventListener('click', () => {
      btnClips.classList.add('active');
      btnGifs.classList.remove('active');
      tabClips.style.display = 'block';
      tabGifs.style.display = 'none';
      outputEl.innerHTML = ''; statusEl.innerText = '';
    });

    btnGifs.addEventListener('click', () => {
      btnGifs.classList.add('active');
      btnClips.classList.remove('active');
      tabGifs.style.display = 'block';
      tabClips.style.display = 'none';
      outputEl.innerHTML = ''; statusEl.innerText = '';
    });

    // --- CLIPS LOGIC ---
    document.getElementById('process-clip-btn').addEventListener('click', async () => {
      try {
        const fileInput = document.getElementById('clip-video');
        if (!fileInput.files.length) return alert('Please upload a video first.');
        
        const file = fileInput.files[0];
        const count = parseInt(document.getElementById('clip-count').value);
        const length = parseFloat(document.getElementById('clip-length').value);
        
        statusEl.innerText = "Analyzing video duration...";
        outputEl.innerHTML = '';

        const videoElement = document.createElement('video');
        videoElement.src = URL.createObjectURL(file);
        await new Promise((resolve) => { videoElement.onloadedmetadata = resolve; });

        const duration = videoElement.duration;
        if (duration < length) throw new Error("Video is too short for that clip length!");

        statusEl.innerText = "Loading engine...";
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        statusEl.innerText = "Reading video into memory...";
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        for (let i = 0; i < count; i++) {
          statusEl.innerText = `Fast-cutting clip ${i + 1} of ${count}...`;
          
          const maxStartTime = Math.max(0, duration - length);
          const startTime = Math.random() * maxStartTime;
          const outputName = `clip_${i + 1}.mp4`;
          
          await ffmpeg.run(
            '-i', 'input.mp4',
            '-ss', startTime.toString(),
            '-t', length.toString(),
            '-c', 'copy',
            '-map_metadata', '0',
            outputName
          );

          const data = ffmpeg.FS('readFile', outputName);
          const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
          
          const link = document.createElement('a');
          link.href = url; link.download = outputName; link.innerText = `⬇️ Download Clip ${i + 1}`; link.className = 'download-btn';
          outputEl.appendChild(link);
          
          await new Promise(r => setTimeout(r, 100));
        }

        statusEl.style.color = "#9ca3af"; statusEl.innerText = "Done! Download your clips below.";
      } catch (err) {
        statusEl.style.color = "#ef4444"; statusEl.innerText = "ERROR: " + err.message;
      }
    });

    // --- GIF LOGIC ---
    document.getElementById('process-gif-btn').addEventListener('click', async () => {
      try {
        const fileInput = document.getElementById('gif-video');
        const wmInput = document.getElementById('gif-watermark');
        if (!fileInput.files.length) return alert('Please upload a video for the GIF.');
        
        const file = fileInput.files[0];
        const wmFile = wmInput.files.length ? wmInput.files[0] : null;
        
        const speed = parseFloat(document.getElementById('gif-speed').value);
        const resolution = document.getElementById('gif-res').value;
        const direction = document.getElementById('gif-loop').value;
        
        statusEl.innerText = "Loading engine...";
        outputEl.innerHTML = '';
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        statusEl.innerText = "Reading files into memory...";
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
        if (wmFile) {
          ffmpeg.FS('writeFile', 'watermark.png', await fetchFile(wmFile));
        }

        statusEl.innerText = "Rendering GIF (This is heavy on the phone, please wait)...";
        
        // 1. Set speed and scale. (-2 keeps aspect ratio mathematically correct)
        let filter = `[0:v]setpts=${1/speed}*PTS,scale=${resolution}:-2`;
        if (direction === 'reverse') filter += `,reverse`;
        filter += `[base];`;
        
        let lastPad = 'base';
        let args = ['-i', 'input.mp4'];
        
        // 2. Add Watermark if uploaded (W-w-10:H-h-10 puts it bottom right)
        if (wmFile) {
            args.push('-i', 'watermark.png');
            filter += `[${lastPad}][1:v]overlay=W-w-10:H-h-10[with_wm];`;
            lastPad = 'with_wm';
        }
        
        // 3. Handle Ping-Pong looping
        if (direction === 'pingpong') {
            filter += `[${lastPad}]split[v1][v2];[v2]reverse[v_rev];[v1][v_rev]concat=n=2:v=1:a=0[pingpong];`;
            lastPad = 'pingpong';
        }
        
        // 4. Optimize GIF colors (Palette generation)
        filter += `[${lastPad}]split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse`;
        
        args.push('-filter_complex', filter, 'output.gif');
        
        await ffmpeg.run(...args);

        const data = ffmpeg.FS('readFile', 'output.gif');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'image/gif' }));
        
        const link = document.createElement('a');
        link.href = url; 
        link.download = `watermark_edit.gif`; 
        link.innerText = `⬇️ Download GIF`; 
        link.className = 'download-btn download-gif';
        outputEl.appendChild(link);
        
        statusEl.style.color = "#9ca3af"; statusEl.innerText = "GIF complete!";
      } catch (err) {
        statusEl.style.color = "#ef4444"; statusEl.innerText = "ERROR: " + err.message;
      }
    });
  </script>
</body>
</html>
