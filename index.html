<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Clipper</title>
  <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
  <style>
    /* Backup styling in case the security headers block Tailwind on mobile */
    body { background-color: #111827; color: white; padding: 1rem; font-family: sans-serif; }
    .container { background-color: #1f2937; padding: 1.5rem; border-radius: 0.75rem; max-width: 28rem; margin: 2rem auto; }
    input, select, button { width: 100%; margin-bottom: 1.5rem; padding: 0.5rem; border-radius: 0.25rem; color: black; }
    button { background-color: #2563eb; color: white; font-weight: bold; border: none; padding: 1rem; cursor: pointer; }
    .download-btn { background-color: #16a34a; display: block; text-align: center; text-decoration: none; padding: 0.75rem; margin-top: 0.5rem; color: white; font-weight: bold; border-radius: 0.25rem; }
  </style>
</head>
<body>
  <div class="container shadow-lg">
    <h1 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; text-align: center;">Video Clipper</h1>
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">1. Upload Video:</label>
    <input type="file" id="video-upload" accept="video/*">
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">2. Number of Clips:</label>
    <input type="number" id="clip-count" value="5" min="1" max="20">
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">3. Clip Length:</label>
    <select id="clip-length">
      <option value="3">3 Seconds</option>
      <option value="5">5 Seconds</option>
      <option value="10">10 Seconds</option>
    </select>
    
    <button id="process-btn">Process Video</button>
    
    <div id="status" style="margin-top: 1rem; text-align: center; color: #9ca3af; font-family: monospace;"></div>
    <div id="output" style="margin-top: 1.5rem;"></div>
  </div>

  <script type="module">
    // Using unpkg and toBlobURL to bypass strict COEP security headers
    import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const ffmpeg = new FFmpeg();
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    document.getElementById('process-btn').addEventListener('click', async () => {
      const fileInput = document.getElementById('video-upload');
      if (!fileInput.files.length) return alert('Please upload a video first.');
      
      const file = fileInput.files[0];
      const count = parseInt(document.getElementById('clip-count').value);
      const length = parseInt(document.getElementById('clip-length').value);
      
      statusEl.innerText = "Loading video engine (this may take a minute)...";
      outputEl.innerHTML = '';

      if (!ffmpeg.loaded) {
        const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.4/dist/esm';
        try {
          // This specific loading method prevents the app from getting stuck
          await ffmpeg.load({
            coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
            wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm')
          });
        } catch (e) {
          statusEl.innerText = "Error loading engine. Refresh and try again.";
          console.error(e);
          return;
        }
      }

      statusEl.innerText = "Reading video...";
      await ffmpeg.writeFile('input.mp4', await fetchFile(file));

      const videoElement = document.createElement('video');
      videoElement.src = URL.createObjectURL(file);
      await new Promise(resolve => {
        videoElement.onloadedmetadata = resolve;
      });
      const duration = videoElement.duration;
      
      if (duration < length) {
        statusEl.innerText = "Error: Video too short.";
        return alert('Video is too short for that clip length!');
      }

      for (let i = 0; i < count; i++) {
        statusEl.innerText = `Cutting clip ${i + 1} of ${count}...`;
        
        const maxStartTime = duration - length;
        const startTime = Math.max(0, Math.random() * maxStartTime);
        const outputName = `clip_${i + 1}.mp4`;
        
        await ffmpeg.exec([
          '-i', 'input.mp4',
          '-ss', startTime.toString(),
          '-t', length.toString(),
          '-c', 'copy',
          outputName
        ]);

        const data = await ffmpeg.readFile(outputName);
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const link = document.createElement('a');
        link.href = url;
        link.download = outputName;
        link.innerText = `⬇️ Download Clip ${i + 1}`;
        link.className = 'download-btn';
        outputEl.appendChild(link);
      }

      statusEl.innerText = "Done! Download your clips above.";
    });
  </script>
</body>
</html>
