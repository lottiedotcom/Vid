<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Clipper</title>
  <style>
    body { background-color: #111827; color: white; padding: 1rem; font-family: sans-serif; }
    .container { background-color: #1f2937; padding: 1.5rem; border-radius: 0.75rem; max-width: 28rem; margin: 2rem auto; box-sizing: border-box; }
    input, select, button { width: 100%; margin-bottom: 1.5rem; padding: 0.75rem; border-radius: 0.5rem; color: black; box-sizing: border-box; border: 1px solid #4b5563; font-size: 1rem; }
    input[type="file"] { color: white; }
    button { background-color: #2563eb; color: white; font-weight: bold; border: none; cursor: pointer; }
    button:hover { background-color: #1d4ed8; }
    .download-btn { background-color: #16a34a; display: block; text-align: center; text-decoration: none; padding: 0.75rem; margin-top: 0.5rem; color: white; font-weight: bold; border-radius: 0.5rem; }
    #status { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container shadow-lg">
    <h1 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; text-align: center;">Video Clipper</h1>
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">1. Upload Video:</label>
    <input type="file" id="video-upload" accept="video/*">
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">2. Number of Clips:</label>
    <input type="number" id="clip-count" value="5" min="1" max="20">
    
    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">3. Clip Length (Seconds):</label>
    <input type="number" id="clip-length" value="3" min="1" max="60">
    
    <button id="process-btn">Process Video</button>
    
    <div id="status" style="margin-top: 1rem; text-align: center; color: #9ca3af; font-family: monospace; font-size: 0.85rem;"></div>
    <div id="output" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    document.getElementById('process-btn').addEventListener('click', async () => {
      try {
        const fileInput = document.getElementById('video-upload');
        if (!fileInput.files.length) {
          alert('Please upload a video first.');
          return;
        }
        
        const file = fileInput.files[0];
        const count = parseInt(document.getElementById('clip-count').value);
        const length = parseInt(document.getElementById('clip-length').value);
        
        statusEl.innerText = "Analyzing video...";
        outputEl.innerHTML = '';

        const videoUrl = URL.createObjectURL(file);
        const videoElement = document.createElement('video');
        videoElement.src = videoUrl;
        videoElement.muted = true;
        videoElement.playsInline = true;

        await new Promise((resolve, reject) => {
          videoElement.onloadedmetadata = resolve;
          videoElement.onerror = () => reject(new Error("Failed to load video file."));
        });

        const duration = videoElement.duration;
        if (duration < length) {
          throw new Error(`Video is too short (${duration.toFixed(1)}s) for a ${length}s clip!`);
        }

        if (!window.MediaRecorder) {
          throw new Error("MediaRecorder is not supported in this mobile browser.");
        }

        for (let i = 0; i < count; i++) {
          statusEl.innerText = `Recording clip ${i + 1} of ${count}...`;
          
          const maxStartTime = duration - length;
          const startTime = Math.max(0, Math.random() * maxStartTime);
          
          const clipBlob = await recordSegment(videoElement, startTime, length);
          
          const url = URL.createObjectURL(clipBlob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `clip_${i + 1}.webm`;
          link.innerText = `⬇️ Download Clip ${i + 1} (${length}s)`;
          link.className = 'download-btn';
          outputEl.appendChild(link);
        }

        statusEl.style.color = "#9ca3af";
        statusEl.innerText = "Done! Download your clips below.";
        
      } catch (err) {
        console.error(err);
        statusEl.style.color = "#ef4444";
        statusEl.innerText = "ERROR: " + err.message;
      }
    });

    function recordSegment(video, startTime, duration) {
      return new Promise((resolve, reject) => {
        video.currentTime = startTime;
        
        video.onseeked = async () => {
          try {
            const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
              const blob = new Blob(chunks, { type: 'video/webm' });
              resolve(blob);
            };

            recorder.start();
            video.play();

            setTimeout(() => {
              recorder.stop();
              video.pause();
            }, duration * 1000);

          } catch (e) {
            reject(e);
          }
        };
      });
    }
  </script>
</body>
</html>
